server {
    listen 80;
    server_name gyzjhcxa.com www.gyzjhcxa.com;
    return 301 https://gyzjhcxa.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.gyzjhcxa.com;

    ssl_certificate /etc/nginx/ssl/gyzjhcxa.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gyzjhcxa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /baidu_verify_codeva-bmpt15JQCh.html {
        root /var/www/gyzj/public;
        default_type text/html;
    }

    location / {
        return 301 https://gyzjhcxa.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gyzjhcxa.com;

    ssl_certificate /etc/nginx/ssl/gyzjhcxa.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gyzjhcxa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
